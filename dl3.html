<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>标题</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
        <link rel="stylesheet" href="dl.css">
        <style>
        .k img{
          width: 80%;
        }
        .k {
          text-align: left;
          background-color:white;
        }
        html {
          background: #cacaca76;
        }
        a:focus{
          outline: none;
        }
        /* 重置内外边距 */
          * {
            -webkit-tap-highlight-color:transparent;
            padding: 0;
            box-sizing: border-box;
            margin: 0;
          }
          nav ul{
            list-style: none;
            /* 水平排列 */
            display: flex;
            /*居中*/
            justify-content: center;
            /*每个导航项的距离*/
            gap: 5%;
          }
          nav ul li a {
            position: relative;
            color: black;
            text-decoration: none;
            padding:2px 2px;
            display: inline-block;
            z-index: 1;
          }
          /* 悬停时展开 */
          nav ul li a:hover::before{
            transform: scaleX(1);
          }
          /* 滑块背景 */
          nav ul li a::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:#3e9bffc2 ;
            /* 初始宽度为0 */
            transform: scaleX(0);
            /* 从左向右展开 */
            transform-origin:left ;
            transition: transform 0.3s ease;
            z-index: -1;
            border-radius: 10px;
          }
          nav ul li.gl a{
            background-color:#3e9bffc2 ;
            border-radius: 10px;
          }
          div{
            text-align:center ;
          }
          span {
            margin: 5px auto;
            background: #3e9bffc2;
            color:white ;
          }
          h2{
            margin: 20px auto;
          }
          /* ===== 可点击的 label 容器 ===== */
.carousel-label {
    display: block;
    cursor: pointer;
    position: relative;
}

/* ===== 轮播容器默认展开 ===== */
#dh2 {
    overflow: hidden;
    max-height: 420px;                /* 根据你的图片实际高度调整，要比实际大 */
    transition: max-height 0.5s ease, padding 0.3s ease;
    animation-play-state: running;
}

/* ===== 折叠时 ===== */
#toggleCarousel:checked ~ .carousel-label #dh2 {
    max-height: 0;
    padding: 0;
    animation-play-state: paused;
}

/* ===== “...”符号默认隐藏 ===== */
.collapse-indicator {
    display: none;
    height: 10px;                    /* 与轮播图高度一致，根据你的图高调整 */
    align-items: center;
    justify-content: center;
    font-size: 8px;
    color: #666;
    background: #f0f0f0;
    border-radius: 8px;
    user-select: none;
}

/* ===== 折叠时显示“...” ===== */
#toggleCarousel:checked ~ .carousel-label .collapse-indicator {
    display: flex;
}
          #k {
            background: white;
          }
          #bt{
            margin:5px auto;
            text-align: center;
            text-decoration: inline-block;
          }
          #dl {
            width: 100%;
            display: block;
          }
          #dh {
           
           width:100%;
           margin: 5px auto;
           overflow: hidden;
          }
          #dh1 {
            width: 100%;
            background-color: white;
          }
          #dh2{
            width: 100%;
            overflow: hidden;
          }
          #dh3 {
            display: flex;
            width: 600%;
            animation: s 18s infinite ease-in-out;
          }
          .dh4 {
            width: 16.666%;
          }
          .dh4 img {
            object-fit:cover ;
            aspect-ratio: 16/9;
            width: 100%;
            display: block;
          }
          @keyframes s {
            0%{
              transform: translateX(0);
            }
            13.89%{
              transform: translateX(0);
            }
            16.67%{
              transform: translateX(-16.666%);
            }
            30.56% {
              transform: translateX(-16.666%);
            }
            33.333%{
              transform: translateX(-33.333%);
            }
            47.22%{
              transform: translateX(-33.333%);
            }
            50%{
              transform: translateX(-50%);
            }
            63.89%{
              transform: translateX(-50%);
            }
            66.67%{
              transform: translateX(-66.666%);
            }
            80.56%{
              transform: translateX(-66.666%);
            }
            83.33%{
              transform: translateX(-83.333%);
            }
            97.22%{
              transform: translateX(-83.333%);
            }
            100%{
              transform: translateX(0);
            }
          }
        </style>
    </head>
    <body>
      <!-- 导航栏 -->
      <div id="dh">
      <img id="dl" src="dl.jpg">
      <hr>
      <!-- 隐藏的 checkbox -->
<input type="checkbox" id="toggleCarousel" hidden>
<!-- 可点击的 label，包裹整个轮播图和“...”符号 -->
<label for="toggleCarousel" class="carousel-label">
      <div id="dh2">
        <div id="dh3">

            <div class="dh4">

            </div>
            <div class="dh4">
              <img src="5.jpg">
            </div>
            <div class="dh4">
              <img src="6.jpg">
            </div>
        </div>
      </div>
    <span class="collapse-indicator">…点击展开</span>
</label>
